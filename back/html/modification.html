<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IRVE Admin — Modifier le point</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="page" id="back-modif">
  <header>
    <div class="logo">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm1 14H11v-5h2zm0-7H11V7h2z"/></svg></div>
      <span class="logo-name">IRVE Admin</span><span class="admin-badge">Back-office</span>
    </div>
    <nav>
      <a href="accueil.html">Accueil</a>
      <a href="liste.html" class="active">Liste</a>
      <a href="creation.html">Nouveau</a>
    </nav>
  </header>

  <div class="content">
    <a href="liste.html" class="back-link">← Retour à la liste</a>
    <div class="page-header">
      <div>
        <div class="page-title">Modifier le point de recharge</div>
        <div class="page-sub">ID : FRXXE7400123 · /back/edit/{id}</div>
      </div>
    </div>

    <div class="form-card">
      <div class="form-section-title">Informations aménageur</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Aménageur <span class="required">*</span></label><input class="form-input" type="text" value="R3" /></div>
        <div class="form-group"><label class="form-label">SIREN</label><input class="form-input" type="text" value="902 726 488" /></div>
        <div class="form-group"><label class="form-label">Opérateur</label><input class="form-input" type="text" value="SPV COM" /></div>
        <div class="form-group"><label class="form-label">Contact</label><input class="form-input" type="email" value="exploitation@r3-charge.fr" /></div>
      </div>

      <div class="form-section-title">Caractéristiques techniques</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Type de prise</label>
          <select class="form-select">
            <option selected>Combo CCS</option>
            <option>CHAdeMO</option>
            <option>Type 2</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Puissance (kW)</label><input class="form-input" type="number" value="22" /></div>
        <div class="form-group"><label class="form-label">Nb points</label><input class="form-input" type="number" value="2" /></div>
        <div class="form-group"><label class="form-label">Mise en service</label><input class="form-input" type="date" value="2023-03-15" /></div>
      </div>

      <div class="form-section-title">Localisation</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Commune</label><input class="form-input" type="text" value="Brest" /></div>
        <div class="form-group">
          <label class="form-label">Département</label>
          <select class="form-select">
            <option>22</option>
            <option selected>29 — Finistère</option>
            <option>35</option>
            <option>56</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Latitude</label><input class="form-input" type="text" value="48.3904" /></div>
        <div class="form-group"><label class="form-label">Longitude</label><input class="form-input" type="text" value="-4.4861" /></div>
      </div>

      <div class="form-actions">
        <button class="btn-save">Sauvegarder</button>
        <a href="liste.html" style="text-decoration: none;"><button type="button" class="btn-cancel">Annuler</button></a>
      </div>
    </div>
  </div>

  <footer><span>Groupe CIR2 — 2026</span><span>ISEN Ouest</span></footer>
</div>

</body>
</html>
