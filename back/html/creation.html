<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IRVE Admin — Nouveau point</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="page" id="back-creation">
  <header>
    <div class="logo">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm1 14H11v-5h2zm0-7H11V7h2z"/></svg></div>
      <span class="logo-name">IRVE Admin</span><span class="admin-badge">Back-office</span>
    </div>
    <nav>
      <a href="accueil.html">Accueil</a>
      <a href="liste.html">Liste</a>
      <a href="creation.html" class="active">Nouveau</a>
    </nav>
  </header>

  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">Nouveau point de recharge</div>
        <div class="page-sub">/back/create</div>
      </div>
    </div>

    <div class="form-card">
      <div class="form-section-title">Informations aménageur</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Aménageur <span class="required">*</span></label><input class="form-input" type="text" placeholder="Ex : R3" /></div>
        <div class="form-group"><label class="form-label">SIREN</label><input class="form-input" type="text" placeholder="000 000 000" /></div>
        <div class="form-group"><label class="form-label">Opérateur <span class="required">*</span></label><input class="form-input" type="text" placeholder="Ex : SPV COM" /></div>
        <div class="form-group"><label class="form-label">Contact opérateur</label><input class="form-input" type="email" placeholder="contact@operateur.fr" /></div>
      </div>

      <div class="form-section-title">Caractéristiques techniques</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Type de prise <span class="required">*</span></label>
          <select class="form-select">
            <option>— Sélectionner —</option>
            <option>Combo CCS</option>
            <option>CHAdeMO</option>
            <option>Type 2</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Puissance (kW) <span class="required">*</span></label><input class="form-input" type="number" placeholder="22" /></div>
        <div class="form-group"><label class="form-label">Nb points de charge</label><input class="form-input" type="number" placeholder="1" /></div>
        <div class="form-group"><label class="form-label">Mise en service</label><input class="form-input" type="date" /></div>
      </div>

      <div class="form-section-title">Localisation</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Commune <span class="required">*</span></label><input class="form-input" type="text" placeholder="Ex : Brest" /></div>
        <div class="form-group">
          <label class="form-label">Département <span class="required">*</span></label>
          <select class="form-select">
            <option>— Sélectionner —</option>
            <option>22</option>
            <option>29</option>
            <option>35</option>
            <option>56</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Latitude</label><input class="form-input" type="text" placeholder="48.0000" /></div>
        <div class="form-group"><label class="form-label">Longitude</label><input class="form-input" type="text" placeholder="-4.0000" /></div>
      </div>

      <div class="form-actions">
        <button class="btn-save">Enregistrer</button>
        <a href="liste.html" style="text-decoration: none;"><button type="button" class="btn-cancel">Annuler</button></a>
      </div>
    </div>
  </div>

  <footer><span>Groupe CIR2 — 2026</span><span>ISEN Ouest</span></footer>
</div>

</body>
</html>
