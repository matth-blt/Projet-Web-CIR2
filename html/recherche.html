<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRVE Bretagne — Recherche</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/recherche.css">
    <script src="../js/recherche.js" defer></script>
</head>
<body>
    <div class="page">
        <header>
            <div class="logo">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M19 9h-5V3a1 1 0 0 0-.69-.95c-.41-.13-.86.01-1.12.36l-8 11a1 1 0 0 0-.08 1.04c.17.34.51.55.89.55h5v6a1 1 0 0 0 1 1c.31 0 .62-.15.81-.41l8-11a1 1 0 0 0 .08-1.04A.99.99 0 0 0 19 9"></path></svg>
                </div>
                <span class="logo-name">IRVE Bretagne</span>
            </div>
            <button class="nav-toggle" aria-label="Menu" aria-expanded="false" onclick="this.setAttribute('aria-expanded', this.getAttribute('aria-expanded')==='true'?'false':'true'); document.querySelector('nav').classList.toggle('open')">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M3 5h18v2H3zm0 6h18v2H3zm0 6h18v2H3z"/></svg>
            </button>
            <nav>
                <a href="../index.html">Accueil</a>
                <a href="recherche.html" class="active">Recherche</a>
                <a href="carte.html">Carte</a>
            </nav>
        </header>

        <div class="search-section">
            <div class="section-heading">Recherche de bornes</div>
            <div class="section-sub">Filtrez les points de recharge par aménageur, type de prise et département</div>

            <div class="search-card">
                <div class="search-card-title">Critères de recherche</div>
                <div class="filter-row">
                    <div class="field-group">
                        <label class="field-label">Aménageur</label>
                        <select class="field-select" id="select-amenageur">
                            <option value="">— Tous —</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label class="field-label">Type de prise</label>
                        <select class="field-select" id="select-prise">
                            <option value="">— Tous —</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label class="field-label">Département</label>
                        <select class="field-select" id="select-departement">
                            <option value="">— Tous —</option>
                        </select>
                    </div>
                </div>
                <button class="search-btn">Lancer la recherche</button>
            </div>

            <div class="results-header">
                <span class="results-title">Résultats</span>
                <span class="results-count" id="results-count">- bornes trouvées</span>
            </div>
            <div class="table-wrap">
                <table id="results-table">
                    <thead>
                        <tr>
                            <th>Date de mise en service</th>
                            <th>Type de prise</th>
                            <th>Puissance</th>
                            <th>Localisation</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="results-body">
                        <!-- Rempli dynamiquement en JS -->
                    </tbody>
                </table>
                <div class="pager" id="results-pager">
                    <!-- Rempli dynamiquement en JS -->
                </div>
            </div>
        </div>

        <footer>
            <span>Matthieu Ballout / Noah Guichard · CIR2</span>
            <span>ISEN Ouest</span>
        </footer>
    </div>
</body>
</html>
